# Render.com Blueprint Configuration
# Deploy command: Connect GitHub repo to Render Dashboard
# Free tier: 750 hours/month, sleeps after 15 min inactivity

services:
  # ==========================================================================
  # API Service (FastAPI)
  # ==========================================================================
  - type: web
    name: agentops-api
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    
    # Health check configuration
    healthCheckPath: /ping
    
    # Environment variables (set in Render Dashboard)
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: API_KEY_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
# - GitHub Actions scheduled workflow
#
# Set up a cron job to ping https://your-app.onrender.com/ping every 14 minutes
